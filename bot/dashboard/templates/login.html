<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Argus — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .auth-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--argus-dark);
      position: relative;
      overflow: hidden;
    }
    .auth-bg::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,142,247,.12) 0%, transparent 70%);
      top: -200px; left: -200px;
      pointer-events: none;
    }
    .auth-bg::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,.08) 0%, transparent 70%);
      bottom: -150px; right: -100px;
      pointer-events: none;
    }
    .auth-card {
      background: var(--argus-panel);
      border: 1px solid var(--argus-border);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--argus-accent);
      margin-bottom: .3rem;
    }
    .auth-logo i { font-size: 1.8rem; }
    .auth-sub {
      color: var(--argus-muted);
      font-size: .82rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--argus-muted);
      font-size: .75rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--argus-border);
    }
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap i {
      position: absolute;
      left: .875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--argus-muted);
      font-size: .9rem;
      pointer-events: none;
    }
    .input-icon-wrap .form-control {
      padding-left: 2.5rem;
    }
    .btn-auth {
      background: var(--argus-accent);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: .9rem;
      padding: .65rem;
      transition: background .2s, box-shadow .2s;
    }
    .btn-auth:hover {
      background: #3a7ae8;
      box-shadow: 0 4px 16px rgba(79,142,247,.4);
    }
    .alert-inline {
      background: rgba(247,95,95,.12);
      border: 1px solid rgba(247,95,95,.3);
      color: #f75f5f;
      border-radius: 10px;
      padding: .6rem .9rem;
      font-size: .83rem;
      margin-bottom: 1.25rem;
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: .4rem;
      color: var(--argus-muted);
      font-size: .8rem;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color .15s;
    }
    .back-link:hover { color: var(--argus-text); }
  </style>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card">
    <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
    <div class="auth-logo">
      <img
      id="argusLogo"
      class="argus-logo-image"
      src="{{ url_for('static', filename='assets/ARGUS LOGO W.png') }}" 
      data-dark-logo="{{ url_for('static', filename='assets/ARGUS LOGO W.png') }}"
      data-light-logo="{{ url_for('static', filename='assets/ARGUS LOGO B.png') }}"
      alt="ARGUS">
    </div>
    <div class="auth-sub">Asset Risk & Global Underlay Security</div>

    {% if error %}
    <div class="alert-inline"><i class="bi bi-exclamation-triangle me-1"></i> Invalid username or password.</div>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person"></i>
          <input class="form-control" name="username" placeholder="Enter username" required autofocus autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" class="form-control" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button class="btn btn-auth btn-primary w-100" type="submit">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div class="text-center" style="font-size:.82rem; color:var(--argus-muted)">
      No account? <a href="/register" style="color:var(--argus-accent)">Create one</a>
    </div>
  </div>
</div>
<script>
  const theme = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", theme);
  const logo = document.getElementById("argusLogo");
  if(logo) {
    logo.src = theme === "dark"
    ? logo.dataset.darkLogo
    : logo.dataset.lightLogo;
  }
</script>
</body>
</html>
